<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGCA RTR Simulator — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;font-family:'Segoe UI',Arial,sans-serif;
  background:#070a14;display:flex;align-items:center;
  justify-content:center;min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 25% 40%,rgba(26,58,106,.35) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(255,107,53,.07) 0%,transparent 50%);
  pointer-events:none;
}
.card{
  background:#0c1120;border:1px solid #1a2a4a;
  border-radius:18px;padding:44px 40px 36px;
  width:100%;max-width:420px;position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#1a3a6a 0%,#4a8fff 50%,#ff6b35 100%);
  border-radius:18px 18px 0 0;
}
.logo{text-align:center;margin-bottom:26px}
.logo-text{font-size:11px;font-weight:800;color:#4a8fff;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.logo-text em{color:#ff6b35;font-style:normal}
.logo-sub{font-size:10px;color:#2a4a6a;letter-spacing:1.5px;text-transform:uppercase}
.plane-wrap{display:flex;justify-content:center;margin-bottom:20px}
.login-title{font-size:20px;font-weight:900;color:#c8d8f0;text-align:center;letter-spacing:.5px;margin-bottom:6px;line-height:1.3}
.login-title span{color:#ff6b35}
.login-sub{font-size:11px;color:#3a5878;text-align:center;margin-bottom:26px;line-height:1.6}
.divider{width:44px;height:2px;background:linear-gradient(90deg,#1a3a6a,#4a8fff);border-radius:2px;margin:0 auto 26px}
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:9px;font-weight:700;color:#3a5878;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.input-wrap{position:relative}
.input-wrap .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.45;pointer-events:none}
.form-group input{
  width:100%;padding:11px 14px 11px 38px;
  background:#080d1c;border:1px solid #1a2a4a;
  border-radius:8px;font-size:13px;color:#c8d8f0;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.form-group input:focus{border-color:#4a8fff;box-shadow:0 0 0 3px rgba(74,143,255,.1)}
.form-group input::placeholder{color:#1e3050;font-size:12px}
#login-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#1a3a6a 0%,#2a5aaa 100%);
  color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;
  letter-spacing:1px;text-transform:uppercase;
  transition:all .2s;margin-top:6px;
}
#login-btn:hover{filter:brightness(1.15);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,58,106,.4)}
#login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;filter:none}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:10px;height:20px}
.btn-spinner{
  display:none;width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .btn-text{display:none}
.loading .btn-spinner{display:block}
#msg{
  display:none;border-radius:6px;
  padding:10px 14px;font-size:12px;
  text-align:center;margin-top:14px;
}
#msg.error{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);color:#ff7070}
#msg.success{background:rgba(0,200,100,.08);border:1px solid rgba(0,200,100,.2);color:#00cc88}
.card-footer{margin-top:22px;padding-top:18px;border-top:1px solid #0e1830;text-align:center;font-size:9px;color:#162030;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">DGCA <em>RTR(A)</em> Simulator</div>
    <div class="logo-sub">Radio Telephony Practice</div>
  </div>
  <div class="plane-wrap">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="23" stroke="#1a2a4a" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="23" stroke="#4a8fff" stroke-width="1.5" stroke-dasharray="36 110" opacity=".6"/>
      <path d="M10 24L38 24M30 16L38 24L30 32" stroke="#4a8fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 19.5L18 14L22 16L22 19.5" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M18 28.5L18 34L22 32L22 28.5" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="login-title">Welcome,<br><span>Student Login</span></div>
  <div class="login-sub">Enter your credentials to access<br>the RTR Practice Simulator</div>
  <div class="divider"></div>

  <div class="form-group">
    <label>Full Name</label>
    <div class="input-wrap">
      <span class="icon">👤</span>
      <input type="text" id="inp-name" placeholder="Enter your full name" autocomplete="off">
    </div>
  </div>
  <div class="form-group">
    <label>User ID</label>
    <div class="input-wrap">
      <span class="icon">🪪</span>
      <input type="text" id="inp-userid" placeholder="e.g. CRW-001" autocomplete="off" style="text-transform:uppercase">
    </div>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <span class="icon">🔒</span>
      <input type="password" id="inp-password" placeholder="Enter your password" autocomplete="off">
    </div>
  </div>

  <button id="login-btn" onclick="doLogin()">
    <div class="btn-inner">
      <span class="btn-text">Login →</span>
      <div class="btn-spinner"></div>
    </div>
  </button>
  <div id="msg"></div>
  <div class="card-footer">For Training Use Only · Captain Romeo Whisky</div>
</div>

<script>
document.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const name     = document.getElementById('inp-name').value.trim();
  const userId   = document.getElementById('inp-userid').value.trim().toUpperCase();
  const password = document.getElementById('inp-password').value.trim();

  hideMsg();
  if(!name||!userId||!password){ showMsg('Please fill in all fields.','error'); return; }

  setLoading(true);

  try {
    /* Call server-side API — credentials never exposed to browser */
    const res = await fetch('/api/login', {
      method:  'POST',
      headers: { 'Content-Type':'application/json' },
      body:    JSON.stringify({ name, userId, password })
    });
    const data = await res.json();

    if(data.success){
      showMsg('Access granted! Redirecting...','success');
      /* Store session token — no passwords stored */
      sessionStorage.setItem('rtr_auth', JSON.stringify({
        name:     data.name,
        userId:   data.userId,
        token:    data.token,
        loggedIn: true,
        time:     Date.now()
      }));
      setTimeout(()=>{ window.location.href='index.html'; }, 800);
    } else {
      setLoading(false);
      showMsg('Invalid credentials. Please check your Name, User ID and Password.','error');
    }
  } catch(e) {
    setLoading(false);
    showMsg('Connection error. Please try again.','error');
    console.error(e);
  }
}

function showMsg(txt,type){
  const el=document.getElementById('msg');
  el.textContent=txt; el.className=type; el.style.display='block';
}
function hideMsg(){ const el=document.getElementById('msg'); el.style.display='none'; }
function setLoading(on){
  const btn=document.getElementById('login-btn');
  btn.disabled=on; btn.classList.toggle('loading',on);
}
</script>
</body>
</html>
