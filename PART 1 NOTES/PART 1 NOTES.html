
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --panel:#0D1117;--surface:#111820;--card:#151E28;--border:#1E2A3A;
  --amber:#F5A623;--green:#00D97E;--red:#FF4444;--blue:#4A9EFF;
  --text:#C8D8E8;--muted:#5A7A9A;--dim:#2A3A4A;
}
body{font-family:'IBM Plex Mono',monospace;background:transparent;color:var(--text);font-size:13px}
#app{display:grid;grid-template-columns:220px 1fr;min-height:640px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--panel)}
#nav{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#nav-header{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.freq-display{font-family:'VT323',monospace;font-size:26px;color:var(--amber);letter-spacing:2px;line-height:1}
.freq-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px}
#nav-items{flex:1;overflow-y:auto;padding:6px}
#nav-items::-webkit-scrollbar{width:3px}
#nav-items::-webkit-scrollbar-track{background:transparent}
#nav-items::-webkit-scrollbar-thumb{background:var(--dim)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;transition:background .15s;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:var(--card);border-color:var(--border)}
.nav-item.active{background:var(--card);border-color:var(--amber);color:var(--amber)}
.nav-num{font-family:'VT323',monospace;font-size:16px;min-width:22px;color:var(--muted)}
.nav-item.active .nav-num{color:var(--amber)}
.nav-title{font-size:11px;line-height:1.3;color:var(--text)}
.nav-item.active .nav-title{color:var(--amber)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);margin-left:auto;flex-shrink:0}
.nav-dot.done{background:var(--green)}
#content{background:var(--panel);overflow-y:auto;display:flex;flex-direction:column}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--dim)}
#content-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ch-title{font-family:'VT323',monospace;font-size:22px;color:var(--amber);letter-spacing:1px}
.ch-sub{font-size:10px;color:var(--muted);letter-spacing:1px}
#progress-bar{height:2px;background:var(--dim)}
#progress-fill{height:100%;background:var(--amber);transition:width .3s}
#cards-area{padding:14px 18px;flex:1}
.section-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--blue)}
.card.flipped{border-color:var(--green)}
.card-q{font-size:12px;color:var(--text);line-height:1.5;margin-bottom:6px}
.card-a{font-size:12px;color:var(--green);line-height:1.5;display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--dim)}
.card.flipped .card-a{display:block}
.card-tag{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
.table-wrap{overflow-x:auto;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--dim);color:var(--amber);font-family:'VT323',monospace;font-size:14px;padding:8px 10px;text-align:left;letter-spacing:1px}
td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
tr:hover td{background:var(--card)}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.tag-amber{background:#2A1E00;color:var(--amber);border:1px solid #3A2800}
.tag-green{background:#001A0E;color:var(--green);border:1px solid #002E18}
.tag-red{background:#2A0000;color:var(--red);border:1px solid #440000}
.tag-blue{background:#001530;color:var(--blue);border:1px solid #00244A}
.quiz-wrap{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:14px}
.quiz-q{font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.6}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:8px 10px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text);cursor:pointer;text-align:left;transition:border-color .15s;line-height:1.4}
.opt-btn:hover{border-color:var(--blue)}
.opt-btn.correct{border-color:var(--green);color:var(--green);background:#001A0E}
.opt-btn.wrong{border-color:var(--red);color:var(--red);background:#2A0000}
.quiz-feedback{font-size:11px;margin-top:10px;padding:8px;border-radius:4px;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.ok{background:#001A0E;color:var(--green);border:1px solid #002E18}
.quiz-feedback.bad{background:#2A0000;color:var(--red);border:1px solid #440000}
.btn{background:transparent;border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer;transition:border-color .15s}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn-primary{border-color:var(--amber);color:var(--amber)}
.info-box{border-left:2px solid var(--amber);padding:8px 12px;background:var(--card);margin-bottom:10px;border-radius:0 4px 4px 0}
.info-box.green{border-left-color:var(--green)}
.info-box.red{border-left-color:var(--red)}
.info-box.blue{border-left-color:var(--blue)}
.info-title{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.info-body{font-size:12px;color:var(--text);line-height:1.6}
.mnem{font-family:'VT323',monospace;font-size:18px;color:var(--amber);letter-spacing:2px}
#quiz-score{font-family:'VT323',monospace;font-size:16px;color:var(--green);padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:4px}
.phonetic-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:8px;text-align:center}
.p-letter{font-family:'VT323',monospace;font-size:28px;color:var(--amber)}
.p-word{font-size:11px;color:var(--text)}
.p-pron{font-size:10px;color:var(--muted)}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center}
.stat-val{font-family:'VT323',monospace;font-size:24px;color:var(--amber)}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:1px}
#done-banner{display:none;background:var(--card);border:1px solid var(--green);border-radius:6px;padding:14px;text-align:center;margin-bottom:14px}
#done-banner.show{display:block}
.done-t{font-family:'VT323',monospace;font-size:22px;color:var(--green);letter-spacing:2px}
</style>
<script src="../protection.js"></script>
<h2 class="sr-only">DGCA RTR(A) exam cockpit-themed study session — flashcards, tables and quizzes across all topics</h2>

<div id="app">
<div id="nav">
  <div id="nav-header">
    <div class="freq-display" id="freq-disp">118.100</div>
    <div class="freq-label">ACTIVE FREQ — RTR STUDY</div>
  </div>
  <div id="nav-items"></div>
</div>
<div id="content">
  <div id="content-header">
    <div><div class="ch-title" id="ch-title">READY</div><div class="ch-sub" id="ch-sub">SELECT A MODULE</div></div>
    <div id="quiz-score">0 / 0</div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  <div id="cards-area"></div>
</div>
</div>

<script>
const MODULES = [
  {id:'defs',freq:'118.100',title:'DEFINITIONS',sub:'ATS · AIRSPACE · RT TERMS',
   content:()=>buildDefs()},
  {id:'abbr',freq:'119.300',title:'ABBREVIATIONS',sub:'RT · SPOKEN · LETTER FORM',
   content:()=>buildAbbr()},
  {id:'phrase',freq:'121.500',title:'RT PHRASEOLOGY',sub:'27+ STANDARD PHRASES',
   content:()=>buildPhrase()},
  {id:'numbers',freq:'122.800',title:'NUMBER TRANSMISSION',sub:'HEADINGS · QNH · TRANSPONDER',
   content:()=>buildNumbers()},
  {id:'callsign',freq:'123.450',title:'CALL SIGN SUFFIXES',sub:'TOWER · APPROACH · CONTROL',
   content:()=>buildCallSign()},
  {id:'fir',freq:'124.700',title:'FIRs & ICAO CODES',sub:'5 FIRs · LOCATION INDICATORS',
   content:()=>buildFIR()},
  {id:'airline',freq:'125.050',title:'AIRLINE CODES',sub:'ICAO · IATA · RT CALLSIGNS',
   content:()=>buildAirline()},
  {id:'tech',freq:'126.900',title:'TRANSMISSION TECHNIQUE',sub:'RATE · DISCIPLINE · TIMING',
   content:()=>buildTech()},
  {id:'emerg',freq:'121.500',title:'EMERGENCY RT',sub:'MAYDAY · PANPAN · SILENCE',
   content:()=>buildEmerg()},
  {id:'lic',freq:'128.350',title:'LICENSING & EQUIPMENT',sub:'DGCA · WPC · ARSL · VHF/HF',
   content:()=>buildLic()},
  {id:'met',freq:'130.000',title:'MET CODES',sub:'METAR · TAF · SIGMET · PIREP',
   content:()=>buildMet()},
  {id:'radio',freq:'131.450',title:'RADIO THEORY',sub:'PROPAGATION · MODULATION · LAYERS',
   content:()=>buildRadio()},
  {id:'selcal',freq:'132.000',title:'SELCAL',sub:'CODES · CHECK PROCEDURE',
   content:()=>buildSelcal()},
  {id:'satcom',freq:'133.200',title:'SATCOM & VDL',sub:'BANDS · UPLINK · VDL MODES',
   content:()=>buildSatcom()},
  {id:'ics',freq:'134.500',title:'ICS / PA SYSTEMS',sub:'INTERPHONE · PA · PRIORITY',
   content:()=>buildICS()},
];

const visited=new Set();
let scores={correct:0,total:0};
let currentMod=null;

function buildNav(){
  const el=document.getElementById('nav-items');
  MODULES.forEach((m,i)=>{
    const d=document.createElement('div');
    d.className='nav-item';
    d.id='nav-'+m.id;
    d.innerHTML=`<span class="nav-num">${String(i+1).padStart(2,'0')}</span><span class="nav-title">${m.title}</span><span class="nav-dot" id="dot-${m.id}"></span>`;
    d.onclick=()=>loadModule(m);
    el.appendChild(d);
  });
}

function loadModule(m){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('nav-'+m.id).classList.add('active');
  document.getElementById('freq-disp').textContent=m.freq;
  document.getElementById('ch-title').textContent=m.title;
  document.getElementById('ch-sub').textContent=m.sub;
  visited.add(m.id);
  document.getElementById('dot-'+m.id).classList.add('done');
  updateProgress();
  currentMod=m;
  const area=document.getElementById('cards-area');
  area.innerHTML='';
  area.appendChild(m.content());
}

function updateProgress(){
  const pct=Math.round(visited.size/MODULES.length*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('quiz-score').textContent=scores.correct+' / '+scores.total;
}

function card(q,a,tag=''){
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`<div class="card-tag">${tag} — CLICK TO REVEAL</div><div class="card-q">${q}</div><div class="card-a">${a}</div>`;
  d.onclick=()=>d.classList.toggle('flipped');
  return d;
}

function section(title){
  const d=document.createElement('div');
  d.className='section-label';
  d.textContent=title;
  return d;
}

function grid(...cards){
  const g=document.createElement('div');
  g.className='card-grid';
  cards.forEach(c=>g.appendChild(c));
  return g;
}

function infoBox(title,body,color=''){
  const d=document.createElement('div');
  d.className='info-box '+(color||'');
  d.innerHTML=`<div class="info-title">${title}</div><div class="info-body">${body}</div>`;
  return d;
}

function tableBlock(headers,rows){
  const w=document.createElement('div');
  w.className='table-wrap';
  const t=document.createElement('table');
  t.innerHTML='<tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr>'+
    rows.map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('');
  w.appendChild(t);
  return w;
}

function quiz(qs){
  const wrap=document.createElement('div');
  let qi=0;
  function show(){
    wrap.innerHTML='';
    if(qi>=qs.length){
      wrap.innerHTML=`<div id="done-banner" class="show"><div class="done-t">QUIZ COMPLETE</div><div style="font-size:11px;color:var(--muted);margin-top:6px">All questions answered</div></div>`;
      return;
    }
    const q=qs[qi];
    const d=document.createElement('div');
    d.className='quiz-wrap';
    d.innerHTML=`<div class="quiz-q"><span class="tag tag-amber" style="margin-right:8px">Q ${qi+1}/${qs.length}</span>${q.q}</div>`;
    const og=document.createElement('div');og.className='quiz-opts';
    const fb=document.createElement('div');fb.className='quiz-feedback';
    q.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='opt-btn';b.textContent=o;
      b.onclick=()=>{
        Array.from(og.children).forEach(x=>x.style.pointerEvents='none');
        if(i===q.ans){
          b.classList.add('correct');
          fb.textContent='✓  CORRECT — '+q.exp;
          fb.className='quiz-feedback show ok';
          scores.correct++;
        } else {
          b.classList.add('wrong');
          og.children[q.ans].classList.add('correct');
          fb.textContent='✗  INCORRECT — '+q.exp;
          fb.className='quiz-feedback show bad';
        }
        scores.total++;
        updateProgress();
        const nb=document.createElement('button');
        nb.className='btn btn-primary';nb.style.marginTop='10px';
        nb.textContent=qi<qs.length-1?'NEXT →':'FINISH';
        nb.onclick=()=>{qi++;show();};
        d.appendChild(nb);
      };
      og.appendChild(b);
    });
    d.appendChild(og);d.appendChild(fb);
    wrap.appendChild(d);
  }
  show();
  return wrap;
}

function frag(...els){
  const f=document.createDocumentFragment();
  els.forEach(e=>{
    if(typeof e==='string'){const d=document.createElement('div');d.style.marginBottom='8px';d.innerHTML=e;f.appendChild(d);}
    else f.appendChild(e);
  });
  return f;
}

function buildDefs(){
  const f=document.createDocumentFragment();
  f.appendChild(section('KEY DEFINITIONS — CLICK CARDS TO REVEAL'));
  f.appendChild(grid(
    card('What is ATS?','Air Traffic Services — generic term for flight information service, alerting service, air traffic advisory service, and air traffic control service','DEF'),
    card('Define ATSU','Air Traffic Services Unit — a generic term for ATC unit, flight information centre, or air-ground facility','DEF'),
    card('What is an aerodrome?','A defined area on land or water intended to be used wholly or in part for arrival, departure and movement of aircraft','DEF'),
    card('Define controlled airspace','Airspace of defined dimensions within which ATC service is provided in accordance with the airspace classification','DEF'),
    card('What is a TMA?','Terminal Maneuvering Area — controlled airspace established at the confluence of ATS routes in the vicinity of major aerodromes','DEF'),
    card('Define CTR','Control Zone — controlled airspace extending upward from the surface to a specified upper limit','DEF'),
    card('What is a FIR?','Flight Information Region — airspace of defined dimensions within which FIS and alerting service are provided','DEF'),
    card('Define blind transmission','A transmission made to a station where two-way communication cannot be established but where it is believed the called station can receive the message','DEF'),
  ));
  f.appendChild(section('COMMUNICATION TERMS'));
  f.appendChild(grid(
    card('What is "Duplex"?','Communications where transmission and reception can occur simultaneously on two different frequencies','COMMS'),
    card('What is "Simplex"?','Communications using the same frequency for both transmission and reception — cannot transmit and receive simultaneously','COMMS'),
    card('Define guard frequency','A frequency monitored by an aircraft in addition to the assigned working frequency — typically 121.5 MHz VHF or 243.0 MHz UHF','COMMS'),
    card('What is SELCAL?','Selective Calling System — allows a ground station to alert a specific aircraft by transmitting a unique 4-tone code','COMMS'),
  ));
  f.appendChild(section('QUICK QUIZ'));
  f.appendChild(quiz([
    {q:'A TMA is established near:',opts:['Oceanic routes','Major aerodromes','Military restricted zones','Airways intersections above FL245'],ans:1,exp:'TMA is at confluence of ATS routes near major aerodromes'},
    {q:'Blind transmission is used when:',opts:['Normal comms are prohibited','Two-way comms fail but reception may be possible','Weather precludes all RT','Frequency congestion occurs'],ans:1,exp:'When 2-way fails but the station may still be able to receive'},
    {q:'A CTR extends from:',opts:['FL100 upward','1000ft AGL to FL245','The surface upward to specified limit','500ft AGL to TMA base'],ans:2,exp:'Control Zone extends from surface to a specified upper limit'},
  ]));
  return f;
}

function buildAbbr(){
  const f=document.createDocumentFragment();
  f.appendChild(section('RT ABBREVIATIONS — TABLE'));
  f.appendChild(tableBlock(['ABBR','MEANING','TYPE'],[
    ['ATC','Air Traffic Control','RT'],['ATS','Air Traffic Services','RT'],['ATZ','Aerodrome Traffic Zone','RT'],
    ['CTR','Control Zone','RT'],['FIR','Flight Information Region','RT'],['FIS','Flight Information Service','RT'],
    ['HF','High Frequency (3–30 MHz)','RT'],['VHF','Very High Frequency (30–300 MHz)','RT'],
    ['ELT','Emergency Locator Transmitter','RT'],['SSR','Secondary Surveillance Radar','RT'],
    ['ATIS','Automatic Terminal Information Service','RT'],['QNH','Altimeter setting to give elevation at airfield','RT'],
    ['QFE','Altimeter setting to give zero on touchdown','RT'],['QDM','Magnetic bearing to station','RT'],
    ['SIGMET','Significant Meteorological Information','MET'],['METAR','Meteorological Aerodrome Report','MET'],
    ['TAF','Terminal Aerodrome Forecast','MET'],['PIREP','Pilot Report','MET'],
    ['SELCAL','Selective Calling System','COMMS'],['SATCOM','Satellite Communications','COMMS'],
  ]));
  f.appendChild(section('SPOKEN ABBREVIATIONS — PHONETIC'));
  f.appendChild(grid(
    card('How is "ACKNOWLEDGE" abbreviated in RT?','ACKDO not used — say full word ACKNOWLEDGE','SPOKEN'),
    card('How do you say the letter "C" in RT?','CHARLIE','SPOKEN'),
    card('How do you say the digit "9" in RT?','NINER','SPOKEN'),
    card('How do you say "3" in RT?','THREE (not "three" like English — emphatic pronunciation)','SPOKEN'),
    card('How do you say "5" in RT?','FIFE','SPOKEN'),
    card('How do you say "2000" in RT?','TWO THOUSAND','SPOKEN'),
  ));
  f.appendChild(section('QUIZ'));
  f.appendChild(quiz([
    {q:'QNH is:',opts:['Bearing to station','Altimeter setting for field elevation at sea level reference','Magnetic track to destination','Pressure altitude'],ans:1,exp:'QNH gives altitude above MSL; field elevation when on ground'},
    {q:'"FIFE" is spoken for:',opts:['4','5','9','7'],ans:1,exp:'5 is spoken as FIFE to avoid confusion with fire/five'},
    {q:'VHF frequency range:',opts:['3–30 MHz','300–3000 MHz','30–300 MHz','30–300 kHz'],ans:2,exp:'VHF = Very High Frequency = 30 to 300 MHz'},
  ]));
  return f;
}

function buildPhrase(){
  const f=document.createDocumentFragment();
  f.appendChild(section('RT PHRASEOLOGY — 27+ PHRASES'));
  f.appendChild(tableBlock(['PHRASE','MEANING'],[
    ['ACKNOWLEDGE','Let me know that you have received and understood this message'],
    ['AFFIRM','Yes / That is correct'],
    ['APPROVED','Permission granted to proceed as requested'],
    ['BREAK','Separation between messages addressed to different stations (in congested RT)'],
    ['BREAK BREAK','Urgently separates messages in very congested conditions'],
    ['CANCEL','Annul the previously transmitted clearance'],
    ['CHECK','Examine a system or procedure — no answer expected unless findings are negative'],
    ['CLEARED','Authorised to proceed under conditions specified'],
    ['CONFIRM','I request verification — or — have you received?'],
    ['CONTACT','Establish communications with...'],
    ['CORRECT','True / Accurate'],
    ['CORRECTION','An error was made; the correct version is...'],
    ['DISREGARD','Ignore / this transmission is in error'],
    ['EXPEDITE','Carry out without delay'],
    ['FREECALL','Contact [unit] without prior coordination'],
    ['GO AHEAD','Proceed with your message'],
    ['HOW DO YOU READ','What is the readability of my transmission? (Scale 1–5)'],
    ['I SAY AGAIN','Repetition for emphasis or because of bad readability'],
    ['MAINTAIN','Continue in accordance with condition(s) specified'],
    ['MONITOR','Listen out on (frequency)'],
    ['NEGATIVE','No / Permission not granted / That is not correct'],
    ['NEXT','Your turn after the aircraft currently receiving instructions'],
    ['OUT','End of communication — no reply expected'],
    ['OVER','My transmission is ended — reply expected'],
    ['READ BACK','Repeat all / specified part of this message exactly as received'],
    ['REPORT','Pass me the following information...'],
    ['REQUEST','I would like to know / I wish to obtain'],
    ['ROGER','I have received all your last transmission'],
    ['SAY AGAIN','Repeat all or following part of your last transmission'],
    ['SPEAK SLOWER','Reduce your rate of speech'],
    ['STANDBY','Wait — I will call you'],
    ['UNABLE','I cannot comply with your request / instruction'],
    ['WILCO','I understand and will comply'],
    ['WORDS TWICE','Communication difficult — send every phrase twice'],
  ]));
  f.appendChild(section('CRITICAL DISTINCTIONS — ROGER vs WILCO vs AFFIRM'));
  f.appendChild(infoBox('ROGER','Means "received all of your last transmission." Does NOT mean yes, does NOT mean you will comply. Purely an acknowledgement of receipt.'));
  f.appendChild(infoBox('WILCO','Means "I understand and will comply." Use when you intend to act on a clearance. Implies ROGER — do NOT say ROGER WILCO.','green'));
  f.appendChild(infoBox('AFFIRM','Means YES / CORRECT. NOT "affirmative." Never use "affirmative" — it is non-standard.','blue'));
  f.appendChild(infoBox('NEGATIVE','Means NO. Say NEGATIVE, not "no" or "nope."','red'));
  f.appendChild(section('QUIZ'));
  f.appendChild(quiz([
    {q:'You receive a clearance and intend to comply. You say:',opts:['ROGER','AFFIRM','WILCO','STANDBY'],ans:2,exp:'WILCO = understand + will comply. ROGER only acknowledges receipt.'},
    {q:'A pilot says "HOW DO YOU READ" — they want to know:',opts:['Your location','If you copy their message','The readability of their signal 1–5','Your QNH setting'],ans:2,exp:'HOW DO YOU READ asks for signal readability on the 1–5 scale'},
    {q:'ROGER WILCO is:',opts:['Standard procedure','Non-standard — redundant','Used only for MAYDAY','Correct at HF but not VHF'],ans:1,exp:'WILCO already implies reception; adding ROGER is redundant and non-standard'},
    {q:'"I SAY AGAIN" is used:',opts:['To begin any transmission','For emphasis or when readability is poor','Only for emergency messages','To indicate end of contact'],ans:1,exp:'I SAY AGAIN = repeating for emphasis or bad readability'},
  ]));
  return f;
}

function buildNumbers(){

}

function buildICS(){

    ['Passenger Address (PA)','One-way announcements to passengers','Crew → Passengers'],
